<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Prep Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1>Meeting Prep Dashboard</h1>
      <p>Run briefings, scan meetings on a calendar, and click briefed meetings to read output.</p>
    </header>

    <nav class="tabs" role="tablist" aria-label="Dashboard Tabs">
      <button class="tab is-active" id="tab-calendar" role="tab" aria-selected="true" data-target="panel-calendar">Calendar</button>
      <button class="tab" id="tab-briefings" role="tab" aria-selected="false" data-target="panel-briefings">Briefings</button>
    </nav>

    <section class="panel is-active" id="panel-calendar" role="tabpanel" aria-labelledby="tab-calendar">
      <div class="controls">
        <button id="run-agent-btn" class="run-btn" type="button">Run Agent</button>
        <span id="run-status" class="status">Ready</span>
      </div>
      <div id="calendar"></div>
    </section>

    <section class="panel" id="panel-briefings" role="tabpanel" aria-labelledby="tab-briefings">
      <div class="briefing-layout">
        <aside class="briefing-list-wrap">
          <h2>Briefed Meetings</h2>
          <div id="briefing-list" class="briefing-list"></div>
        </aside>
        <article class="briefing-view">
          <h2 id="briefing-title">Select a meeting</h2>
          <div id="briefing-content">Run the agent, then select a briefed meeting from the calendar or list.</div>
        </article>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
